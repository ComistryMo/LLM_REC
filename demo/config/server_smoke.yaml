### model
model_name_or_path: /data/hz/models/OneReason-0.8B-pretrain-competition
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: full
enable_liger_kernel: true

### dataset
dataset: data_final
dataset_dir: demo/LLaMA-Factory/data
template: qwen3_nothink
cutoff_len: 4096
max_samples: 10
packing: true
neat_packing: true
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: demo/output/smoke_onereason_0.8b_sft
logging_steps: 1
save_strategy: 'no'
plot_loss: true
overwrite_output_dir: true
report_to: tensorboard
logging_dir: demo/output/smoke_onereason_0.8b_sft/tb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
bf16: true
pure_bf16: true
seed: 20260701
